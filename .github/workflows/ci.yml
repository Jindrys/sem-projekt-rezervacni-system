name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Unit testy ─────────────────────────────────
  unit-tests:
    name: Unit testy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastav Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalace závislostí
        run: npm ci

      - name: Spusť unit testy
        run: npm run test:unit

  # ── Job 2: Integrační testy ───────────────────────────
  integration-tests:
    name: Integrační testy
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: reservation_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastav Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalace závislostí
        run: npm ci

      - name: Spusť integrační testy
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_NAME: reservation_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          NODE_ENV: test
        run: npm run test:integration

  # ── Job 3: Coverage ───────────────────────────────────
  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastav Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalace závislostí
        run: npm ci

      - name: Spusť testy s coverage
        run: npm run test:coverage

      - name: Publikuj coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Job 4: Docker build ───────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Sestav Docker image
        run: docker build -t reservation-system:${{ github.sha }} .