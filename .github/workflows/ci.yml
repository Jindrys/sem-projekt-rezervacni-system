name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Unit testy ─────────────────────────────────
  unit-tests:
    name: Unit testy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastav Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalace závislostí
        run: npm ci

      - name: Spusť unit testy
        run: npm run test:unit

      - name: Publikuj test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: reports/junit.xml
          retention-days: 7

  # ── Job 2: Integrační testy ───────────────────────────
  integration-tests:
    name: Integrační testy
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: reservation_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastav Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalace závislostí
        run: npm ci

      - name: Spusť integrační testy
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_NAME: reservation_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          NODE_ENV: test
        run: npm run test:integration

  # ── Job 3: Statická analýza ───────────────────────────
  lint:
    name: Statická analýza kódu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastav Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalace závislostí
        run: npm ci

      - name: Spusť ESLint
        run: npm run lint

  # ── Job 4: Coverage ───────────────────────────────────
  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastav Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalace závislostí
        run: npm ci

      - name: Spusť testy s coverage
        run: npx c8 jest tests/unit --runInBand

      - name: Publikuj coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Job 5: Docker build ───────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Sestav Docker image
        run: docker build -t reservation-system:${{ github.sha }} .
        
  # ── Job 6: CD – deploy do staging ────────────────────
  deploy-staging:
    name: Deploy do staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Simulace deploye do staging
        run: |
          echo "Deploying to staging namespace..."
          echo "Image: reservation-system:${{ github.sha }}"
          echo "kubectl apply -f k8s/"
          echo "Deploy successful"